<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Senior – Number Draw</title>
  <style>
    /* ===== RESET & BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #0b0e1a, #03050b);
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #f0f4ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
    }

    /* ===== GLASS CARD ===== */
    .glass-card {
      background: rgba(20, 30, 50, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .glass-card:hover {
      border-color: rgba(255, 215, 0, 0.25);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.05) inset;
    }

    /* ===== HEADER ===== */
    .glass-header {
      width: 100%;
      max-width: 1400px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 2rem;
      background: rgba(10, 15, 30, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
    }

    /* ===== CREATIVE TITLE ===== */
    .game-title {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(45deg, #f5e56b, #f7d94e, #ffb347, #f5e56b);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
      outline: none;
      border-bottom: 2px solid rgba(255, 215, 0, 0.2);
      padding-bottom: 4px;
      transition: 0.3s;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
    }
    .game-title:hover {
      border-bottom-color: gold;
      transform: scale(1.02);
    }
    .game-title:focus {
      border-bottom-color: #fff;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== HEADER STATS ===== */
    .header-right {
      display: flex;
      align-items: center;
      gap: 1.8rem;
    }

    .stat-group {
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.2rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      transition: 0.3s;
    }
    .stat-item:hover {
      border-color: rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.05);
    }
    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.3);
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
      line-height: 1.2;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #aaa;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: rgba(255, 215, 0, 0.1);
      border-color: gold;
      color: gold;
      transform: scale(1.05) rotate(90deg);
    }

    /* ===== MAIN GRID ===== */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      gap: 1.8rem;
      width: 100%;
      max-width: 1400px;
      flex: 1;
    }

    .panel {
      padding: 1.2rem 1.2rem 1.5rem;
      display: flex;
      flex-direction: column;
      min-height: 500px;
    }

    /* ===== LEFT: NUMBER GRID ===== */
    .grid-header,
    .history-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 1rem;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
      gap: 6px;
      overflow-y: auto;
      flex: 1;
      align-content: start;
      max-height: 550px;
      padding-right: 4px;
    }
    .number-grid::-webkit-scrollbar {
      width: 4px;
    }
    .number-grid::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .number-grid::-webkit-scrollbar-thumb {
      background: rgba(255, 215, 0, 0.3);
      border-radius: 10px;
    }

    .num-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 0;
      color: rgba(255, 255, 255, 0.25);
      transition: all 0.25s ease;
      cursor: default;
      border: 1px solid transparent;
    }
    .num-item:hover {
      background: rgba(255, 255, 255, 0.07);
      transform: scale(1.04);
      border-color: rgba(255, 215, 0, 0.15);
    }
    .num-item.drawn {
      background: rgba(255, 215, 0, 0.15);
      color: #ffd966;
      border-color: rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.08);
      animation: glowPulse 2s infinite alternate;
    }
    @keyframes glowPulse {
      0% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.1); }
      100% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.25); }
    }

    /* ===== CENTER: COIN & BUTTON (PUSHED DOWN) ===== */
    .coin-panel {
      align-items: center;
      justify-content: flex-start;
      padding-top: 0.5rem;
    }

    .coin-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0.5rem auto 0.5rem;
      perspective: 1200px;
    }

    .coin-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 40%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .coin-container.flip {
      transform: rotateY(180deg) scale(1.1);
    }

    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      border-radius: 50%;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.15), inset 0 -8px 30px rgba(0, 0, 0, 0.6), inset 0 8px 30px rgba(255, 255, 200, 0.4);
    }

    .coin::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border-radius: 50%;
      background: linear-gradient(145deg, #d4af37, #b8860b);
      z-index: -1;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(255, 215, 0, 0.2);
    }

    .coin-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: 700;
      background: radial-gradient(circle at 30% 30%, #f9e27a, #d4af37);
      border: 6px solid #b8860b;
      color: #3d2b0a;
      text-shadow: 0 2px 4px rgba(255, 215, 0, 0.3);
      box-shadow: inset 0 -6px 12px rgba(0, 0, 0, 0.5), inset 0 6px 12px rgba(255, 255, 200, 0.6);
    }
    .coin-front {
      transform: rotateY(0deg);
    }
    .coin-back {
      transform: rotateY(180deg);
      background: radial-gradient(circle at 70% 30%, #e8c97a, #b58d2e);
      border-color: #a67c1e;
      font-size: 5rem;
      color: #7a5f1a;
    }

    .coin-number {
      font-size: 4.8rem;
      font-weight: 900;
      color: #1f1a0a;
      text-shadow: 0 0 40px rgba(255, 200, 50, 0.6);
    }
    .coin-number.reveal {
      animation: zoomInRotate 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes zoomInRotate {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      70% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .coin-glow {
      position: absolute;
      top: 30%;
      left: -30%;
      width: 160%;
      height: 160%;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
      filter: blur(10px);
    }
    .coin-glow.active {
      opacity: 1;
      animation: glowPulseCoin 0.8s ease-out;
    }
    @keyframes glowPulseCoin {
      0% { transform: scale(0.6); opacity: 0; }
      50% { transform: scale(1.6); opacity: 0.7; }
      100% { transform: scale(1); opacity: 0; }
    }

    .particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 50%;
    }

    /* ===== DRAW BUTTON (PUSHED DOWN) ===== */
    .draw-btn {
      position: fixed;
      top: 60%;
      background: linear-gradient(145deg, #f5d742, #d4a017);
      border: none;
      border-radius: 3rem;
      padding: 0.9rem 3rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f1a0a;
      letter-spacing: 3px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(255, 215, 0, 0.25);
      transition: all 0.3s ease;
      overflow: hidden;
      margin-top: 2.5rem;
      text-transform: uppercase;
      width: 100%;
      max-width: 260px;
      animation: softPulse 2s infinite ease-in-out;
    }
    .draw-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 20px 50px rgba(255, 215, 0, 0.5);
      animation-play-state: paused;
    }
    .draw-btn:active {
      transform: scale(0.92);
    }
    .draw-btn:disabled {
      opacity: 0.3;
      transform: none;
      cursor: not-allowed;
      box-shadow: none;
      animation: none;
    }
    .draw-btn .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes softPulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.3); }
      50% { box-shadow: 0 0 30px 10px rgba(255, 215, 0, 0.15); }
      100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.3); }
    }

    .draw-shortcut {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.15);
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ===== RIGHT: HISTORY ===== */
    .history-list {
      list-style: none;
      padding: 0;
      margin: 0;
      overflow-y: auto;
      flex: 1;
      max-height: 500px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .history-list::-webkit-scrollbar {
      width: 4px;
    }
    .history-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    .history-list::-webkit-scrollbar-thumb {
      background: rgba(255, 215, 0, 0.3);
      border-radius: 10px;
    }

    .history-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 0.6rem 1.2rem;
      font-size: 1.1rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      border-left: 3px solid rgba(255, 215, 0, 0.2);
      animation: slideUpFade 0.3s ease-out;
      color: #d0d8f0;
      transition: 0.2s;
    }
    .history-item:hover {
      background: rgba(255, 215, 0, 0.05);
    }
    .history-item .h-num {
      color: #ffd966;
      font-weight: 700;
    }
    .history-item .h-order {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
    }
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== FOOTER ===== */
    .footer {
      width: 100%;
      max-width: 1400px;
      display: flex;
      justify-content: center;
      padding: 1.5rem 0 0.5rem;
      position: relative;
      z-index: 10;
    }
    .reset-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 3rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      transition: 0.25s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      backdrop-filter: blur(6px);
    }
    .reset-btn:hover {
      background: rgba(255, 70, 70, 0.1);
      border-color: rgba(255, 100, 100, 0.3);
      color: #ff8a8a;
      transform: scale(1.02);
      box-shadow: 0 0 25px rgba(255, 70, 70, 0.1);
    }
    .reset-shortcut {
      font-size: 0.65rem;
      opacity: 0.3;
    }

    /* ===== CONFETTI OVERLAY ===== */
    .confetti-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ===== GAME COMPLETE OVERLAY (NO PLAY AGAIN BUTTON) ===== */
    .game-complete-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(16px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      pointer-events: none;
    }
    .game-complete-overlay.active {
      display: flex;
    }
    .complete-modal {
      background: rgba(15, 25, 45, 0.95);
      padding: 3rem 4rem;
      border-radius: 3rem;
      text-align: center;
      max-width: 450px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      animation: scaleBounce 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: auto;
      position: relative;
      box-shadow: 0 0 80px rgba(255, 215, 0, 0.1);
    }
    .complete-modal .complete-icon {
      font-size: 5rem;
      margin-bottom: 0.5rem;
      animation: floatY 3s ease-in-out infinite;
    }
    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .complete-modal h2 {
      font-size: 2.5rem;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #f5e56b, #f7d94e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .complete-modal p {
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 1.5rem;
    }
    .complete-modal .close-modal-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #aaa;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
      position: absolute;
      top: 15px;
      right: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .complete-modal .close-modal-btn:hover {
      background: rgba(255, 70, 70, 0.2);
      border-color: rgba(255, 70, 70, 0.4);
      color: #ff8a8a;
      transform: rotate(90deg);
    }

    @keyframes scaleBounce {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .main-grid {
        grid-template-columns: 1fr 1.2fr;
        gap: 1.2rem;
      }
      .coin-panel {
        grid-column: 1 / -1;
        order: -1;
      }
      .coin-wrapper {
        width: 180px;
        height: 180px;
      }
      .panel {
        min-height: 300px;
      }
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      .glass-header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
        gap: 0.5rem;
        padding: 0.8rem 1rem;
      }
      .header-right {
        justify-content: center;
        flex-wrap: wrap;
      }
      .stat-group {
        gap: 1rem;
      }
      .game-title {
        font-size: 1.8rem;
        text-align: center;
      }
      .panel {
        min-height: auto;
        padding: 1rem;
      }
      .number-grid {
        max-height: 300px;
        grid-template-columns: repeat(auto-fill, minmax(34px, 1fr));
      }
      .coin-wrapper {
        width: 160px;
        height: 160px;
      }
      .coin-number {
        font-size: 3.5rem;
      }
      .draw-btn {
        max-width: 200px;
        font-size: 1.2rem;
        padding: 0.7rem 1.5rem;
        margin-top: 2rem;
      }
      .history-list {
        max-height: 250px;
      }
      .footer {
        padding-top: 0.5rem;
      }
    }

    @media (max-width: 480px) {
      .stat-value {
        font-size: 1.4rem;
      }
      .coin-wrapper {
        width: 130px;
        height: 130px;
      }
      .coin-number {
        font-size: 2.8rem;
      }
      .num-item {
        font-size: 0.65rem;
        padding: 4px 0;
      }
      .number-grid {
        grid-template-columns: repeat(auto-fill, minmax(30px, 1fr));
        gap: 4px;
      }
      .complete-modal {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
    }
    
    .back-btn {
      background:rgb(249, 215, 21);
    
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 30%;
      width: 80px;
      height: 40px;
      font-size: 1.2rem;
      color: black;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
     .back-btn:hover {
      background: rgba(11, 133, 199, 0.5);
      border-color: gold;
      color: gold;
      transform: scale(1.2);
     }

  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="glass-header">

    <div class="header-left">
      <h1 class="game-title" contenteditable="true">Lucky Senior</h1>
    </div>
    

    <div class="header-right">
      <div class="stat-group">

        <div class="stat-item">
          <span class="stat-label">Current</span>
          <span class="stat-value" id="currentNumber">—</span>
        </div>
       
        <div class="stat-item">
          <span class="stat-label">Draws</span>
          <span class="stat-value" id="drawCount">0</span>
        </div>
      </div>
      <button class="icon-btn" id="fullscreenBtn" title="Fullscreen (F)" aria-label="Toggle fullscreen">⛶</button>
    </div>
     <div class="header-center">
    <a href="index.html" class="header-center" title="BACK" >
<button class="back-btn" id="backBtn" label="BACK"  >BACK</button>
</a> 
     </div>
  </header>
  
  
  


  <!-- ===== MAIN ===== -->
  <main class="main-grid">

    <!-- LEFT: Number Grid -->
    <section class="panel grid-panel glass-card">
      <div class="grid-header">
        <span>Numbers</span>
        <span id="remainingCount">99</span>
      </div>
      <div class="number-grid" id="numberGrid" role="grid"></div>
    </section>

    <!-- CENTER: Coin + Draw -->
    <section class="panel coin-panel glass-card">
      <div class="coin-wrapper">
        <div class="coin-container" id="coinContainer">
          <div class="coin" id="coin">
            <div class="coin-face coin-front" id="coinFront">
              <span class="coin-number" id="coinNumber">?</span>
            </div>
            <div class="coin-face coin-back">
              <span class="coin-symbol">✦</span>
            </div>
          </div>
        </div>
        <div class="coin-glow" id="coinGlow"></div>
        <canvas class="particle-canvas" id="particleCanvas"></canvas>
      </div>
      <button class="draw-btn" id="drawBtn">
        <span class="btn-text">DRAW</span>
        <span class="btn-ripple"></span>
      </button>
      <div class="draw-shortcut">␣ Space</div>
    </section>

    <!-- RIGHT: History -->
    <section class="panel history-panel glass-card">
      <div class="history-header">
        <span>History</span>
        <span id="historyCount">0</span>
      </div>
      <ul class="history-list" id="historyList" role="list"></ul>
    </section>

  </main>

  <!-- ===== BOTTOM: RESET ===== -->
  <footer class="footer">
    <button class="reset-btn" id="resetBtn">
      <span>↻ Reset Game</span>
      <span class="reset-shortcut">(R)</span>
    </button>
  </footer>

  <!-- ===== CONFETTI CANVAS OVERLAY ===== -->
  <canvas id="confettiCanvas" class="confetti-overlay"></canvas>

  <!-- ===== GAME COMPLETED OVERLAY (NO PLAY AGAIN) ===== -->
  <div class="game-complete-overlay" id="gameCompleteOverlay">
    <div class="complete-modal glass-card">
      <button class="close-modal-btn" id="closeCompleteBtn" aria-label="Close">✕</button>
      <div class="complete-icon">🎉</div>
      <h2>Game Completed!</h2>
      <p>All 99 numbers have been drawn.</p>
    </div>
  </div>

  <script>
    // ============================================================
    //  LUCKY SENIOR – NUMBER DRAW (SINGLE FILE)
    //  All state, UI, sounds, animations, confetti, particles
    // ============================================================

    (function() {
      'use strict';

      // ---------- DOM refs ----------
      const numberGrid = document.getElementById('numberGrid');
      const currentNumberEl = document.getElementById('currentNumber');
      const drawCountEl = document.getElementById('drawCount');
      const remainingCountEl = document.getElementById('remainingCount');
      const historyList = document.getElementById('historyList');
      const historyCountEl = document.getElementById('historyCount');
      const drawBtn = document.getElementById('drawBtn');
      const resetBtn = document.getElementById('resetBtn');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const closeCompleteBtn = document.getElementById('closeCompleteBtn');
      const coinContainer = document.getElementById('coinContainer');
      const coinNumber = document.getElementById('coinNumber');
      const coinGlow = document.getElementById('coinGlow');
      const particleCanvas = document.getElementById('particleCanvas');
      const confettiCanvas = document.getElementById('confettiCanvas');
      const gameCompleteOverlay = document.getElementById('gameCompleteOverlay');

      // ---------- State ----------
      let drawnNumbers = [];
      let drawCount = 0;
      let currentNumber = null;
      let isGameComplete = false;

      // ---------- Audio context & sounds (generated) ----------
      let audioCtx = null;

      function getAudioCtx() {
        if (!audioCtx) {
          audioCtx = new(window.AudioContext || window.webkitAudioContext)();
        }
        return audioCtx;
      }

      function playTone(freq, duration, type = 'sine', volume = 0.3) {
        try {
          const ctx = getAudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(volume, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (_) { /* silent fail */ }
      }

      function playCoinFlip() {
        playTone(800, 0.08, 'sine', 0.25);
        setTimeout(() => playTone(1200, 0.1, 'sine', 0.2), 80);
        setTimeout(() => playTone(600, 0.12, 'sine', 0.15), 180);
      }

      function playReveal() {
        playTone(1400, 0.2, 'sine', 0.3);
        setTimeout(() => playTone(1800, 0.15, 'sine', 0.25), 150);
        setTimeout(() => playTone(2200, 0.25, 'sine', 0.2), 300);
      }

      function playCelebration() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
          setTimeout(() => playTone(f, 0.3, 'sine', 0.2), i * 150);
        });
      }

      // ---------- Confetti ----------
      let confettiPieces = [];
      let confettiAnimId = null;

      function initConfettiCanvas() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
      window.addEventListener('resize', initConfettiCanvas);
      initConfettiCanvas();

      function fireConfetti(count = 120) {
        const ctx = confettiCanvas.getContext('2d');
        const w = confettiCanvas.width;
        const h = confettiCanvas.height;
        const colors = ['#f5d742', '#ff6b6b', '#4ecdc4', '#ffe66d', '#a29bfe', '#fd79a8', '#fdcb6e'];

        for (let i = 0; i < count; i++) {
          confettiPieces.push({
            x: w / 2 + (Math.random() - 0.5) * 200,
            y: h / 2 - 50,
            w: 6 + Math.random() * 8,
            h: 4 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 12,
            vy: -Math.random() * 14 - 4,
            gravity: 0.15 + Math.random() * 0.1,
            rot: 0,
            rotSpeed: (Math.random() - 0.5) * 0.2,
            life: 1,
            decay: 0.005 + Math.random() * 0.008,
          });
        }

        if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
        animateConfetti();
      }

      function animateConfetti() {
        const ctx = confettiCanvas.getContext('2d');
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

        let alive = false;
        for (const p of confettiPieces) {
          p.x += p.vx;
          p.vy += p.gravity;
          p.y += p.vy;
          p.rot += p.rotSpeed;
          p.life -= p.decay;
          if (p.life <= 0) continue;
          alive = true;
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }

        confettiPieces = confettiPieces.filter(p => p.life > 0);

        if (alive) {
          confettiAnimId = requestAnimationFrame(animateConfetti);
        } else {
          ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
          confettiAnimId = null;
        }
      }

      // ---------- Particles (coin burst) ----------
      let particleItems = [];
      let particleAnimId = null;

      function burstParticles() {
        const canvas = particleCanvas;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        const colors = ['#ffd700', '#ffec8b', '#ffb347', '#ffaa00', '#fff4b0'];
        for (let i = 0; i < 50; i++) {
          const angle = Math.random() * 2 * Math.PI;
          const speed = 3 + Math.random() * 7;
          particleItems.push({
            x: cx,
            y: cy,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            radius: 3 + Math.random() * 6,
            color: colors[Math.floor(Math.random() * colors.length)],
            life: 1,
            decay: 0.01 + Math.random() * 0.02,
          });
        }

        if (particleAnimId) cancelAnimationFrame(particleAnimId);
        animateParticles();
      }

      function animateParticles() {
        const canvas = particleCanvas;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let alive = false;
        for (const p of particleItems) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1;
          p.life -= p.decay;
          if (p.life <= 0) continue;
          alive = true;
          ctx.globalAlpha = p.life * 0.9;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius * p.life, 0, 2 * Math.PI);
          ctx.fillStyle = p.color;
          ctx.fill();
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 15;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        particleItems = particleItems.filter(p => p.life > 0);

        if (alive) {
          particleAnimId = requestAnimationFrame(animateParticles);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particleAnimId = null;
        }
      }

      // ---------- Render UI ----------
      function renderGrid() {
        numberGrid.innerHTML = '';
        for (let i = 1; i <= 99; i++) {
          const div = document.createElement('div');
          div.className = 'num-item';
          div.textContent = i;
          if (drawnNumbers.includes(i)) {
            div.classList.add('drawn');
          }
          numberGrid.appendChild(div);
        }
        remainingCountEl.textContent = 99 - drawnNumbers.length;
      }

      function renderHistory() {
        historyList.innerHTML = '';
        const reversed = [...drawnNumbers].reverse();
        reversed.forEach((num, idx) => {
          const li = document.createElement('li');
          li.className = 'history-item';
          const order = drawnNumbers.length - idx;
          li.innerHTML = `<span class="h-num">${num}</span><span class="h-order">#${order}</span>`;
          historyList.appendChild(li);
        });
        historyCountEl.textContent = drawnNumbers.length;
        if (historyList.firstChild) {
          historyList.scrollTop = 0;
        }
      }

      function updateStats() {
        currentNumberEl.textContent = currentNumber !== null ? currentNumber : '—';
        drawCountEl.textContent = drawCount;
        remainingCountEl.textContent = 99 - drawnNumbers.length;
      }

      // ---------- Save/Load ----------
      function saveState() {
        try {
          localStorage.setItem('luckySenior_drawn', JSON.stringify(drawnNumbers));
          localStorage.setItem('luckySenior_drawCount', String(drawCount));
          localStorage.setItem('luckySenior_current', String(currentNumber !== null ? currentNumber : ''));
        } catch (_) {}
      }

      function loadState() {
        try {
          const drawn = localStorage.getItem('luckySenior_drawn');
          const count = localStorage.getItem('luckySenior_drawCount');
          const current = localStorage.getItem('luckySenior_current');
          if (drawn) {
            drawnNumbers = JSON.parse(drawn);
            if (!Array.isArray(drawnNumbers)) drawnNumbers = [];
          }
          if (count) drawCount = parseInt(count, 10) || 0;
          if (current && current !== '') currentNumber = parseInt(current, 10);
          else currentNumber = null;
        } catch (_) {
          drawnNumbers = [];
          drawCount = 0;
          currentNumber = null;
        }
        drawnNumbers = drawnNumbers.filter(n => Number.isInteger(n) && n >= 1 && n <= 99);
        drawnNumbers = [...new Set(drawnNumbers)];
        if (drawnNumbers.length === 99) {
          isGameComplete = true;
          showCompleteOverlay();
        } else {
          isGameComplete = false;
        }
        if (currentNumber !== null && !drawnNumbers.includes(currentNumber)) {
          currentNumber = drawnNumbers.length > 0 ? drawnNumbers[drawnNumbers.length - 1] : null;
        }
        drawCount = drawnNumbers.length;
        if (drawCount !== drawnNumbers.length) {
          drawCount = drawnNumbers.length;
        }
        updateUI();
      }

      // ---------- Core draw ----------
      function performDraw() {
        if (isGameComplete) return;
        if (drawnNumbers.length >= 99) {
          isGameComplete = true;
          showCompleteOverlay();
          drawBtn.disabled = true;
          return;
        }

        const available = [];
        for (let i = 1; i <= 99; i++) {
          if (!drawnNumbers.includes(i)) available.push(i);
        }
        if (available.length === 0) {
          isGameComplete = true;
          showCompleteOverlay();
          drawBtn.disabled = true;
          return;
        }
        const randomIndex = Math.floor(Math.random() * available.length);
        const newNumber = available[randomIndex];

        drawnNumbers.push(newNumber);
        drawCount = drawnNumbers.length;
        currentNumber = newNumber;

        updateStats();
        renderGrid();
        renderHistory();
        saveState();

        // Animations
        playCoinFlip();
        coinContainer.classList.add('flip');

        setTimeout(() => {
          coinNumber.textContent = currentNumber;
          coinNumber.classList.remove('reveal');
          void coinNumber.offsetWidth;
          coinNumber.classList.add('reveal');

          playReveal();
          coinGlow.classList.remove('active');
          void coinGlow.offsetWidth;
          coinGlow.classList.add('active');
          burstParticles();
          fireConfetti(70);

          setTimeout(() => {
            coinContainer.classList.remove('flip');
          }, 300);
        }, 600);

        if (drawnNumbers.length === 99) {
          isGameComplete = true;
          setTimeout(() => {
            showCompleteOverlay();
            drawBtn.disabled = true;
            playCelebration();
            fireConfetti(250);
          }, 900);
        } else {
          drawBtn.disabled = false;
        }
      }

      // ---------- Reset (Clears everything, no popups) ----------
      function resetGame() {
        if (!confirm('Reset game? All progress will be lost.')) return;
        drawnNumbers = [];
        drawCount = 0;
        currentNumber = null;
        isGameComplete = false;
        localStorage.removeItem('luckySenior_drawn');
        localStorage.removeItem('luckySenior_drawCount');
        localStorage.removeItem('luckySenior_current');
        coinContainer.classList.remove('flip');
        coinNumber.textContent = '?';
        coinNumber.classList.remove('reveal');
        coinGlow.classList.remove('active');
        gameCompleteOverlay.classList.remove('active');
        drawBtn.disabled = false;
        updateUI();
        saveState();
        particleItems = [];
        confettiPieces = [];
        if (particleAnimId) cancelAnimationFrame(particleAnimId);
        if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
        const pCtx = particleCanvas.getContext('2d');
        pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        const cCtx = confettiCanvas.getContext('2d');
        cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }

      function showCompleteOverlay() {
        gameCompleteOverlay.classList.add('active');
        playCelebration();
        fireConfetti(150);
      }

      function hideCompleteOverlay() {
        gameCompleteOverlay.classList.remove('active');
      }

      function updateUI() {
        updateStats();
        renderGrid();
        renderHistory();
        if (currentNumber !== null) {
          coinNumber.textContent = currentNumber;
        } else {
          coinNumber.textContent = '?';
        }
        if (drawnNumbers.length === 99) {
          isGameComplete = true;
          drawBtn.disabled = true;
          showCompleteOverlay();
        } else {
          drawBtn.disabled = false;
        }
      }

      // ---------- Ripple effect ----------
      function addRipple(e) {
        const btn = e.currentTarget;
        const rect = btn.getBoundingClientRect();
        const ripple = btn.querySelector('.btn-ripple');
        const size = Math.max(rect.width, rect.height);
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        ripple.style.animation = 'none';
        void ripple.offsetWidth;
        ripple.style.animation = 'rippleAnim 0.6s linear';
      }

      // ---------- Keyboard shortcuts ----------
      function onKeydown(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;
        const key = e.key;
        if (key === ' ' || key === 'Space') {
          e.preventDefault();
          if (!drawBtn.disabled) performDraw();
        } else if (key === 'f' || key === 'F') {
          e.preventDefault();
          toggleFullscreen();
        } else if (key === 'r' || key === 'R') {
          e.preventDefault();
          resetGame();
        } else if (key === 'Escape') {
          hideCompleteOverlay();
        }
      }

      // ---------- Fullscreen ----------
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      }

      // ---------- Init ----------
      function init() {
        loadState();
        drawBtn.addEventListener('click', performDraw);
        drawBtn.addEventListener('mousedown', addRipple);
        resetBtn.addEventListener('click', resetGame);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        closeCompleteBtn.addEventListener('click', hideCompleteOverlay);
        gameCompleteOverlay.addEventListener('click', function(e) {
          if (e.target === this) hideCompleteOverlay();
        });
        document.addEventListener('keydown', onKeydown);

        coinNumber.textContent = currentNumber !== null ? currentNumber : '?';
        renderGrid();
        renderHistory();
        updateStats();

        if (drawnNumbers.length === 99) {
          isGameComplete = true;
          drawBtn.disabled = true;
          showCompleteOverlay();
        }
        drawCount = drawnNumbers.length;
        drawCountEl.textContent = drawCount;
      }

      window.addEventListener('resize', () => {
        initConfettiCanvas();
        const rect = particleCanvas.parentElement.getBoundingClientRect();
        particleCanvas.width = particleCanvas.parentElement.offsetWidth;
        particleCanvas.height = particleCanvas.parentElement.offsetHeight;
      });

      init();

    })();
  </script>
</body>
</html>
